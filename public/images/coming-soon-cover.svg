<svg width="400" height="600" xmlns="http://www.w3.org/2000/svg">
  <!-- Book background -->
  <rect width="400" height="600" fill="#f5f2e8" />
  
  <!-- Book spine shadow -->
  <rect x="0" y="0" width="40" height="600" fill="#e6e2d3" />
  
  <!-- Book pages -->
  <g id="pages">
    <rect x="40" y="50" width="320" height="20" fill="#fff" />
    <rect x="40" y="90" width="320" height="20" fill="#fff" />
    <rect x="40" y="130" width="320" height="20" fill="#fff" />
    <rect x="40" y="170" width="320" height="20" fill="#fff" />
    <rect x="40" y="210" width="320" height="20" fill="#fff" />
    <rect x="40" y="250" width="320" height="20" fill="#fff" />
    <rect x="40" y="290" width="320" height="20" fill="#fff" />
    <rect x="40" y="330" width="320" height="20" fill="#fff" />
    <rect x="40" y="370" width="320" height="20" fill="#fff" />
    <rect x="40" y="410" width="320" height="20" fill="#fff" />
    <rect x="40" y="450" width="320" height="20" fill="#fff" />
    <rect x="40" y="490" width="320" height="20" fill="#fff" />
    <rect x="40" y="530" width="320" height="20" fill="#fff" />
  </g>
  
  <!-- Book title area -->
  <rect x="100" y="150" width="200" height="300" rx="5" fill="#2E7D8A" opacity="0.8" />
  
  <!-- Title text -->
  <text x="200" y="250" font-family="serif" font-size="24" font-weight="bold" text-anchor="middle" fill="#ffffff">Mokua</text>
  <text x="200" y="290" font-family="serif" font-size="16" text-anchor="middle" fill="#ffffff">Literary Platform</text>
  <text x="200" y="330" font-family="serif" font-size="14" text-anchor="middle" fill="#ffffff">Coming Soon</text>
</svg> 